<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 600px;
            margin: 10px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .reset-code {
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 8px;
            color: #2196F3;
            margin: 24px 0;
        }
        .note {
            font-size: 13px;
            color: #888;
            text-align: center;
            margin-top: 16px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Password Reset</h1>
    <p th:text="'Hello ' + ${username} + ','"></p>
    <p>We received a request to reset your password. Use the code below to proceed. This code expires in 15 minutes.</p>
    <div class="reset-code"><span th:text="${activation_code}"></span></div>
    <p class="note">If you did not request a password reset, please ignore this email. Your password will not change.</p>
</div>
</body>
</html>
